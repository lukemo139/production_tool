<title>Nimbus 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#f5f5f7;font-family:system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:100%;margin:0 auto}
@media(max-width:600px){#app{max-width:520px}}
.top{padding:12px 16px 8px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.top h1{font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:#86868b}
.top .cd{font-size:36px;font-weight:700;letter-spacing:-2px;color:#FF453A;line-height:1;margin:2px 0}
.top .sub{font-size:10px;color:#86868b}
.live{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:600}
.live.ok{background:#34C75922;color:#34C759}
.live.off{background:#FF453A22;color:#FF453A}
.nav{display:flex;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.nav button{flex:1;padding:9px 4px;background:none;border:none;border-bottom:2px solid transparent;color:#86868b;font:500 10px/1 system-ui;cursor:pointer}
.nav button.on{color:#f5f5f7;border-bottom-color:#0A84FF}
.scroll{flex:1;overflow-y:auto;padding:12px;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.scroll.gp{padding:10px 6px 80px}
.filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.sel-wrap{position:relative}
.sel{appearance:none;-webkit-appearance:none;background:#1c1c1e;color:#f5f5f7;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 28px 6px 10px;font:500 11px/1 system-ui;cursor:pointer;outline:none}
.sel:focus{border-color:#0A84FF}
.sel-wrap::after{content:"";position:absolute;right:10px;top:50%;transform:translateY(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid #86868b;pointer-events:none}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}
.stat{background:#1c1c1e;border-radius:10px;padding:11px 12px;border:1px solid rgba(255,255,255,.04)}
.stat .v{font-size:24px;font-weight:700;letter-spacing:-1px;line-height:1}
.stat .l{font-size:9px;color:#86868b;margin-top:1px}
.card{background:#1c1c1e;border-radius:10px;padding:10px 12px;margin-bottom:5px;cursor:pointer;border:1px solid rgba(255,255,255,.04)}
.card:active{background:#2c2c2e}
.title{font-size:12px;font-weight:600;flex:1;line-height:1.3}
.meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}
.meta span{font-size:10px;color:#86868b}
.tag{font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;background:#2c2c2e;color:#aeaeb2}
.ct{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase}
.ct.ov{background:#FF453A22;color:#FF453A}.ct.ur{background:#FF9F0A22;color:#FF9F0A}
.ct.wa{background:#FF9F0A22;color:#FF9F0A}.ct.bl{background:#FF453A22;color:#FF453A}
.ct.on,.ct.ok{display:none}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
.section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#86868b;margin:12px 0 6px}
.al{background:#1c1c1e;border-radius:10px;padding:2px 12px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
.ar{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.ar:last-child{border-bottom:none}
.bar{width:60px;height:4px;background:#2c2c2e;border-radius:2px;overflow:hidden;flex-shrink:0}
.bf{height:100%;border-radius:2px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;backdrop-filter:blur(5px);display:none}
.ov.sh{display:block}
.det{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:#1c1c1e;border-radius:14px 14px 0 0;z-index:101;overflow-y:auto;max-width:600px;margin:0 auto;transform:translateY(100%);transition:transform .25s ease}
.det.sh{transform:translateY(0)}
.det .hn{width:30px;height:3px;background:#48484a;border-radius:2px;margin:8px auto 0}
.det .hd{padding:12px 16px 8px;border-bottom:1px solid rgba(255,255,255,.06)}
.det .hd h2{font-size:15px;font-weight:700;line-height:1.3}
.det .bd{padding:10px 16px 24px}
.st{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#86868b;margin:12px 0 5px}
.dr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.dr .dl{font-size:11px;color:#86868b}.dr .dv{font-size:11px;font-weight:500;text-align:right;max-width:60%}
.mi{background:#2c2c2e;border-radius:6px;padding:7px 9px;margin-bottom:3px}
.dp{display:flex;align-items:center;gap:5px;padding:4px 0}
.gw{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);border:1px solid rgba(255,255,255,.06);border-radius:8px}
.gl{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.gl span{font-size:9px;color:#86868b;display:flex;align-items:center;gap:3px}
.pill{padding:4px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:none;color:#86868b;font:500 10px/1 system-ui;cursor:pointer;white-space:nowrap}
.pill.on{background:#f5f5f7;color:#000;border-color:#f5f5f7}
.ld{display:flex;align-items:center;justify-content:center;height:200px;color:#86868b;font-size:13px}
.rb{background:none;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#0A84FF;font:500 10px/1 system-ui;padding:5px 12px;cursor:pointer}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
// Google Visualization JSONP loader — no CORS issues
const SHEET_ID = "19NnnXrUgzplwiwBuFaKnR0h0VsNqgBix-kPkbMqt6zU";

function loadSheet(sheetName) {
  return new Promise((resolve, reject) => {
    const callbackName = "cb_" + sheetName.replace(/[^a-zA-Z]/g,"") + "_" + Date.now();
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
      "/gviz/tq?tqx=out:json;responseHandler:" + callbackName + "&headers=2&sheet=" + encodeURIComponent(sheetName);
    
    window[callbackName] = function(response) {
      delete window[callbackName];
      document.body.removeChild(script);
      if (response && response.table) {
        const cols = response.table.cols.map(c => c.label || "");
        const rows = response.table.rows.map(r => {
          const obj = {};
          // Named access
          r.c.forEach((cell, i) => {
            if (cols[i]) obj[cols[i]] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : "") : "";
          });
          // Also add index-based access as _0, _1, _2...
          r.c.forEach((cell, i) => {
            obj["_"+i] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v) : "") : "";
          });
          return obj;
        });
        resolve(rows);
      } else {
        resolve([]);
      }
    };
    
    const script = document.createElement("script");
    script.src = url;
    script.onerror = () => { delete window[callbackName]; resolve(null); };
    document.body.appendChild(script);
    
    setTimeout(() => { if (window[callbackName]) { delete window[callbackName]; resolve(null); } }, 10000);
  });
}
</script>

<script type="text/babel">
const{useState,useMemo,useEffect,useCallback}=React;

const AREA_MAP={"Pre-Cantiere":"pre","Permessi":"perm","Ingresso":"ing","Aperitivo":"ape","Area Bagni":"bag","Locali Tecnici":"loc","Chiosco":"chi","Pedana":"ped","Generale":"gen"};
const AREAS=[{id:"pre",n:"Pre-Cantiere"},{id:"perm",n:"Permessi"},{id:"ing",n:"Ingresso"},{id:"ape",n:"Aperitivo"},{id:"bag",n:"Area Bagni"},{id:"loc",n:"Locali Tecnici"},{id:"chi",n:"Chiosco"},{id:"ped",n:"Pedana"},{id:"gen",n:"Generale"}];
const ga=id=>AREAS.find(x=>x.id===id)||{n:"?"};
const today=new Date();
const dd=d=>{if(!d)return 999;try{return Math.ceil((new Date(d)-today)/864e5)}catch(e){return 999}};
const dOpen=dd("2026-05-01");
const fmt=d=>{if(!d)return"—";const p=d.split("-");return p.length===3?p[2]+"/"+p[1]:d;};
const bg=c=>c+"22";
const ganttC={pre:"#0A84FF",perm:"#FF453A",ing:"#5E5CE6",ape:"#BF5AF2",bag:"#30D158",loc:"#FF9F0A",chi:"#FFD60A",ped:"#FF375F",gen:"#86868B"};

// Map row from sheet (with actual column names) to task object
function mapTask(r){
  // Named access with index fallback (_0, _1, etc.)
  const v=(name,idx)=>r[name]||r["_"+idx]||"";
  const id=parseInt(v("TASK ID",0))||parseInt(v("ID",0))||0;
  const zona=v("Zona",1);
  const area=AREA_MAP[zona]||"gen";
  const title=v("Task",2);
  const fase=v("FASE Fase",3)||v("Fase",3);
  const needsS=(v("FORNITORE Serve fornitore?",4)||v("Serve fornitore?",4)).toLowerCase()==="si"?1:0;
  const supplier=v("Quale",5)||r["_5"]||"";
  const confirmed=v("Confermato?",6);
  const needsM=(v("MATERIALI Serve materiali?",7)||v("Serve materiali?",7)).toLowerCase()==="si"?1:0;
  const depsStr=v("DIPENDENZE Dipende da",9)||v("Dipende da",9);
  const deps=depsStr.split(/[;,]/).map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
  const needsP=(v("PERMESSI Serve permesso?",11)||v("Serve permesso?",11)).toLowerCase()==="si"?1:0;
  const permit=r["_12"]||"";
  const permitOk=false;
  const executor=v("TEMPI Eseguita da",13)||v("Eseguita da",13);
  const dExec=parseInt(v("gg esecuz.",14))||1;
  const confidence=v("Fiducia",15)||"Media";
  const deadline=v("Deadline",16);
  const status=v("STATO Stato",17)||v("Stato",17)||"Da fare";
  const note=v("Note",20);
  const dlDate=new Date(deadline||"2026-04-30");
  const startDate=new Date(dlDate);startDate.setDate(startDate.getDate()-(dExec||1));
  const ds=startDate.toISOString().split("T")[0];
  return{id,a:area,t:title,w:executor||zona,ns:needsS,s:supplier,ss:confirmed,nm:needsM,d:deps,np:needsP,p:permit,po:permitOk,dl:deadline,ds,de:deadline,st:status,n:note,dx:dExec,c:confidence,fase};
}

function mapMat(r){
  return{
    id:r["ID"]||Math.random(),
    tid:parseInt(r["Task ID"])||0,
    nm:r["Materiale"]||"",
    q:parseFloat(r["Qta"])||0,
    u:r["Unita"]||"",
    src:r["Provenienza"]||"",
    ok:(r["In cantiere?"]||"").toLowerCase()==="si",
    dd:parseInt(r["Tempo consegna (gg)"])||0,
    nt:r["Note"]||""
  };
}

function App(){
  const[tasks,setTasks]=useState([]);
  const[mats,setMats]=useState([]);
  const[live,setLive]=useState(null);
  const[v,setV]=useState("home");
  const[sel,setSel]=useState(null);
  const[lastUp,setLastUp]=useState(null);

  const load=useCallback(async()=>{
    setLive(null);
    try{
      const[tRows,mRows]=await Promise.all([loadSheet("Task"),loadSheet("Materiali")]);
      if(tRows&&tRows.length>0){
        const mapped=tRows.filter(r=>(r["TASK ID"]||r["_0"])&&(r["Task"]||r["_2"])).map(mapTask);
        setTasks(mapped);setLive(true);
        setLastUp(new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}));
      }else{setLive(false);}
      if(mRows&&mRows.length>0){
        setMats(mRows.filter(r=>r["Materiale"]).map(mapMat));
      }
    }catch(e){console.error(e);setLive(false);}
  },[]);

  useEffect(()=>{load();},[load]);

  const gt=id=>tasks.find(x=>x.id===id);
  const gm=tid=>mats.filter(x=>x.tid===tid);
  const allPeople=useMemo(()=>[...new Set(tasks.map(x=>x.w))].filter(Boolean),[tasks]);

  const probs=t=>{
    const r=[];
    if(t.ns&&(t.ss==="Da trovare"||t.ss==="Da contattare"))r.push({y:"s",x:t.s});
    if(t.nm){const m=gm(t.id).filter(x=>!x.ok);if(m.length)r.push({y:"m",x:m.length+" mat."});}
    if(t.d.length){const u=t.d.filter(x=>{const q=gt(x);return q&&q.st!=="Fatto";});if(u.length)r.push({y:"d",x:u.length+" dip."});}
    if(t.np&&!t.po)r.push({y:"p",x:t.p});
    const dl=dd(t.dl);
    if(dl<0&&t.st!=="Fatto")r.push({y:"o",x:"-"+Math.abs(dl)+"gg"});
    else if(dl<=3&&dl>=0&&t.st!=="Fatto")r.push({y:"u",x:dl+"gg"});
    return r;
  };
  const crit=t=>{if(t.st==="Fatto")return"ok";if(t.st==="Bloccato")return"bl";const dl=dd(t.dl);if(dl<0)return"ov";if(dl<=3)return"ur";if(probs(t).some(p=>p.y==="s"))return"wa";return"on";};
  const critLabel={ov:"SCADUTA",ur:"URGENTE",wa:"ATTENZIONE",bl:"BLOCCATA",on:"",ok:""};
  const bC={s:"#FF453A",m:"#0A84FF",d:"#BF5AF2",p:"#FF9F0A",o:"#FF453A",u:"#FF9F0A"};
  const sortT=(ts,s)=>{const r=[...ts];switch(s){case"dl":return r.sort((a,b)=>new Date(a.dl)-new Date(b.dl));case"cr":const o={ov:0,bl:0,ur:1,wa:2,on:3,ok:4};return r.sort((a,b)=>(o[crit(a)]||3)-(o[crit(b)]||3));case"ar":return r.sort((a,b)=>a.a.localeCompare(b.a));case"wh":return r.sort((a,b)=>a.w.localeCompare(b.w));default:return r;}};

  const Badge=({c,children})=><span className="badge" style={{background:bg(c),color:c}}>{children}</span>;
  const Sel=({value,onChange,children})=><div className="sel-wrap"><select className="sel" value={value} onChange={e=>onChange(e.target.value)}>{children}</select></div>;

  const Card=({task:tk})=>{
    const a=ga(tk.a),ps=probs(tk),cr=crit(tk),cl=critLabel[cr];
    return<div className="card" onClick={()=>setSel(tk)}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>{cl&&<span className={"ct "+cr}>{cl}</span>}<span className="title">{tk.t}</span><span className="tag">{a.n}</span></div>
      <div className="meta"><span>{tk.w}</span><span>{fmt(tk.dl)}</span>{tk.st!=="Da fare"&&<span style={{fontWeight:600,color:tk.st==="Fatto"?"#34C759":tk.st==="Bloccato"?"#FF453A":"#0A84FF"}}>{tk.st}</span>}{ps.map((p,i)=><Badge key={i} c={bC[p.y]}>{p.x}</Badge>)}</div>
    </div>;
  };

  const Detail=()=>{
    const tk=sel;if(!tk)return null;
    const a=ga(tk.a),ms=gm(tk.id),ds=tk.d.map(gt).filter(Boolean),buf=tk.c==="Bassa"?2:tk.c==="Media"?1:0;
    const R=({l,v,c})=><div className="dr"><span className="dl">{l}</span><span className="dv" style={{color:c||"#f5f5f7"}}>{v}</span></div>;
    return<><div className={"ov sh"} onClick={()=>setSel(null)}/><div className={"det sh"}><div className="hn"/>
      <div className="hd"><span className="tag" style={{marginBottom:4,display:"inline-block"}}>{a.n}</span><h2>{tk.t}</h2></div>
      <div className="bd">
        <div className="st">Info</div><R l="Assegnata a" v={tk.w}/><R l="Deadline" v={fmt(tk.dl)+" ("+dd(tk.dl)+"gg)"} c={dd(tk.dl)<0?"#FF453A":dd(tk.dl)<=3?"#FF9F0A":"#f5f5f7"}/><R l="Stato" v={tk.st}/>{tk.n&&<R l="Note" v={tk.n}/>}
        {tk.ns?<><div className="st">Fornitore</div><R l="Chi" v={tk.s||"—"}/><R l="Stato" v={tk.ss||"—"} c={tk.ss==="Da trovare"?"#FF453A":"#FF9F0A"}/></>:null}
        {ms.length>0&&<><div className="st">Materiali {ms.filter(x=>x.ok).length}/{ms.length}</div>{ms.map(m=><div key={m.id} className="mi"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,fontWeight:500}}>{m.nm}</span><Badge c={m.ok?"#34C759":"#FF453A"}>{m.ok?"OK":"Manca"}</Badge></div><div style={{fontSize:9,color:"#86868b",marginTop:1}}>{m.q}{m.u} — {m.src}{m.dd>0?" — "+m.dd+"gg":""}{m.nt?" — "+m.nt:""}</div></div>)}</>}
        {ds.length>0&&<><div className="st">Dipendenze {ds.filter(x=>x.st==="Fatto").length}/{ds.length}</div>{ds.map(d=><div key={d.id} className="dp"><span style={{flex:1,fontSize:11}}>{d.t}</span><span style={{fontSize:10,fontWeight:600,color:d.st==="Fatto"?"#34C759":"#FF9F0A"}}>{d.st}</span></div>)}</>}
        {tk.np?<><div className="st">Permesso</div><R l={tk.p||"Permesso"} v={tk.po?"Ottenuto":"Manca"} c={tk.po?"#34C759":"#FF453A"}/></>:null}
        <div className="st">Tempi</div><R l="Esecuzione" v={tk.dx+"gg"}/><R l="Fiducia" v={tk.c} c={tk.c==="Bassa"?"#FF453A":tk.c==="Media"?"#FF9F0A":"#34C759"}/><R l="Buffer" v={buf+"gg"}/>
      </div></div></>;
  };

  // VIEWS
  const Home=()=>{
    const dn=tasks.filter(x=>x.st==="Fatto").length,ov=tasks.filter(x=>dd(x.dl)<0&&x.st!=="Fatto").length;
    const sf=[...new Set(tasks.filter(x=>x.ss==="Da trovare").map(x=>x.s))].filter(Boolean).length,mm=mats.filter(x=>!x.ok).length;
    return<div><div className="stats">{[[dn,"#34C759","/"+tasks.length+" fatte"],[ov,ov?"#FF453A":"#34C759","scadute"],[sf,sf?"#FF453A":"#34C759","forn. mancanti"],[mm,"#FF9F0A","mat. mancanti"]].map(([v,c,l],i)=><div key={i} className="stat"><div className="v" style={{color:c}}>{v}</div><div className="l">{l}</div></div>)}</div>
    <div className="al">{AREAS.map(ar=>{const ts=tasks.filter(x=>x.a===ar.id),d=ts.filter(x=>x.st==="Fatto").length,pc=ts.length?(d/ts.length)*100:0;return<div key={ar.id} className="ar"><span style={{flex:1,fontWeight:500}}>{ar.n}</span><div className="bar"><div className="bf" style={{width:pc+"%",background:pc>0?"#34C759":"#2c2c2e"}}/></div><span style={{fontSize:10,color:"#86868b",minWidth:28,textAlign:"right"}}>{d}/{ts.length}</span></div>;})}</div>
    {ov>0&&<><div className="section" style={{color:"#FF453A"}}>Scadute</div>{tasks.filter(x=>dd(x.dl)<0&&x.st!=="Fatto").sort((a,b)=>dd(a.dl)-dd(b.dl)).map(x=><Card key={x.id} task={x}/>)}</>}
    <div className="section">Prossime</div>
    {tasks.filter(x=>dd(x.dl)>=0&&dd(x.dl)<=14&&x.st!=="Fatto").sort((a,b)=>dd(a.dl)-dd(b.dl)).slice(0,8).map(x=><Card key={x.id} task={x}/>)}
    </div>;
  };

  const TasksView=()=>{
    const[af,saf]=useState("all"),[so,setSo]=useState("dl"),[sf,sSf]=useState("all"),[wf,sWf]=useState("all");
    const fl=useMemo(()=>{let r=af==="all"?tasks:tasks.filter(x=>x.a===af);if(sf!=="all")r=r.filter(x=>x.st===sf);if(wf!=="all")r=r.filter(x=>x.w===wf);return sortT(r,so);},[af,so,sf,wf,tasks]);
    return<div><div className="filters">
      <Sel value={af} onChange={saf}><option value="all">Tutte le aree</option>{AREAS.map(a=><option key={a.id} value={a.id}>{a.n}</option>)}</Sel>
      <Sel value={wf} onChange={sWf}><option value="all">Tutti</option>{allPeople.map(p=><option key={p} value={p}>{p}</option>)}</Sel>
      <Sel value={sf} onChange={sSf}><option value="all">Ogni stato</option><option value="Da fare">Da fare</option><option value="In attesa">In attesa</option><option value="In corso">In corso</option><option value="Bloccato">Bloccato</option><option value="Fatto">Fatto</option></Sel>
      <Sel value={so} onChange={setSo}><option value="dl">Per deadline</option><option value="cr">Per criticita</option><option value="ar">Per area</option><option value="wh">Per persona</option></Sel>
    </div><div style={{fontSize:10,color:"#86868b",marginBottom:6}}>{fl.length} task</div>{fl.map(x=><Card key={x.id} task={x}/>)}</div>;
  };

  const TeamView=()=>{
    const[f,sf]=useState(allPeople[0]||"");
    const fl=sortT(tasks.filter(x=>x.w===f),"dl");
    return<div><div className="filters"><Sel value={f} onChange={sf}>{allPeople.map(p=><option key={p} value={p}>{p}</option>)}</Sel></div>
    <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>{f} <span style={{fontSize:11,color:"#86868b",fontWeight:400}}>{fl.length} task</span></div>
    {fl.map(x=><Card key={x.id} task={x}/>)}</div>;
  };

  const MatView=()=>{
    const[sf,sSf]=useState("all");const srcs=[...new Set(mats.map(m=>m.src))].filter(Boolean);
    const fl=sf==="all"?mats:mats.filter(x=>x.src===sf);
    return<div><div className="filters"><Sel value={sf} onChange={sSf}><option value="all">Tutti</option>{srcs.map(s=><option key={s} value={s}>{s}</option>)}</Sel></div>
    <div className="stats"><div className="stat"><div className="v" style={{color:"#FF453A"}}>{mats.filter(x=>!x.ok).length}</div><div className="l">Mancanti</div></div><div className="stat"><div className="v" style={{color:"#34C759"}}>{mats.filter(x=>x.ok).length}</div><div className="l">Pronti</div></div></div>
    {fl.map((m,i)=>{const tk=gt(m.tid),a=tk?ga(tk.a):null;return<div key={m.id||i} className="card" onClick={()=>tk&&setSel(tk)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:600}}>{m.nm}</span><Badge c={m.ok?"#34C759":"#FF453A"}>{m.ok?"OK":"Manca"}</Badge></div>
      <div className="meta"><span>{m.q}{m.u}</span><span>{m.src}</span>{m.dd>0&&<span style={{color:"#FF9F0A"}}>{m.dd}gg</span>}{m.nt&&<span style={{color:"#FF453A",fontWeight:600}}>{m.nt}</span>}{tk&&<span className="tag">{tk.t}</span>}</div>
    </div>;})}
    </div>;
  };

  const AlertView=()=>{
    const si=[...new Set(tasks.filter(x=>x.ss==="Da trovare").map(x=>x.s))].filter(Boolean);
    return<div><div className="section" style={{color:"#FF453A"}}>Fornitori da trovare ({si.length})</div>
    <div className="al">{si.map(s=>{const c=tasks.filter(x=>x.s===s&&x.ss==="Da trovare").length;return<div key={s} className="ar"><span style={{flex:1,fontWeight:500}}>{s}</span><span style={{color:"#FF453A",fontWeight:600,fontSize:11}}>{c} task</span></div>;})}</div>
    <div className="section">Criticita ({tasks.filter(x=>x.st!=="Fatto"&&probs(x).length>0).length})</div>
    {sortT(tasks.filter(x=>x.st!=="Fatto"&&probs(x).length>0),"cr").map(x=><Card key={x.id} task={x}/>)}</div>;
  };

  const GanttView=()=>{
    const[mode,setMode]=useState("cant");
    const cantA=["ing","ape","bag","loc","chi","ped","gen"];
    const gt2=mode==="cant"?tasks.filter(x=>cantA.includes(x.a)):tasks;
    const sorted=[...gt2].sort((a,b)=>{const ai=AREAS.findIndex(x=>x.id===a.a),bi=AREAS.findIndex(x=>x.id===b.a);return ai!==bi?ai-bi:new Date(a.ds)-new Date(b.ds);});
    const minD=mode==="cant"?new Date("2026-04-14"):new Date("2026-03-13");const maxD=new Date("2026-05-01");
    const tD=Math.ceil((maxD-minD)/864e5);const dW=mode==="cant"?38:16;const rH=26;const lW=130;
    const days=[];for(let i=0;i<tD;i++){const d=new Date(minD);d.setDate(d.getDate()+i);days.push(d);}
    const gX=d=>Math.max(0,Math.ceil((new Date(d)-minD)/864e5))*dW;
    const gW=(a,b)=>Math.max(1,Math.ceil((new Date(b)-new Date(a))/864e5))*dW;
    return<div><div className="filters"><button className={"pill"+(mode==="cant"?" on":"")} onClick={()=>setMode("cant")}>Cantiere</button><button className={"pill"+(mode==="full"?" on":"")} onClick={()=>setMode("full")}>Progetto</button></div>
    {sorted.length===0?<div className="ld">Nessuna task</div>:
    <div className="gw"><div style={{display:"flex",minWidth:lW+tD*dW}}>
      <div style={{width:lW,flexShrink:0,position:"sticky",left:0,zIndex:2,background:"#000"}}>
        <div style={{height:32,borderBottom:"1px solid rgba(255,255,255,.06)"}}/>
        {sorted.map((tk,i)=><div key={tk.id} onClick={()=>setSel(tk)} style={{height:rH,display:"flex",alignItems:"center",padding:"0 6px",borderBottom:"1px solid rgba(255,255,255,.03)",background:i%2===0?"#0a0a0a":"#000",cursor:"pointer"}}><span style={{fontSize:9,fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tk.t}</span></div>)}</div>
      <div style={{flex:1,position:"relative"}}>
        <div style={{display:"flex",height:32,borderBottom:"1px solid rgba(255,255,255,.06)",position:"sticky",top:0,zIndex:1,background:"#000"}}>
          {days.map((d,i)=>{const we=d.getDay()===0||d.getDay()===6;return<div key={i} style={{width:dW,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRight:"1px solid rgba(255,255,255,.03)",background:we?"rgba(255,255,255,.02)":"transparent"}}><span style={{fontSize:7,color:"#48484a"}}>{["Do","Lu","Ma","Me","Gi","Ve","Sa"][d.getDay()]}</span><span style={{fontSize:9,color:"#86868b"}}>{d.getDate()}</span></div>;})}</div>
        {sorted.map((tk,i)=>{const c=ganttC[tk.a]||"#86868b";return<div key={tk.id} style={{height:rH,position:"relative",borderBottom:"1px solid rgba(255,255,255,.03)",background:i%2===0?"#0a0a0a":"transparent"}}>
          <div onClick={()=>setSel(tk)} style={{position:"absolute",left:gX(tk.ds)+1,top:4,height:rH-8,width:Math.max(gW(tk.ds,tk.de)-2,dW-2),background:c+"44",border:"1px solid "+c+"66",borderRadius:3,cursor:"pointer",display:"flex",alignItems:"center",paddingLeft:3,overflow:"hidden"}}><span style={{fontSize:8,color:c,whiteSpace:"nowrap"}}>{mode==="cant"?tk.w:""}</span></div></div>;})}</div>
    </div></div>}
    <div className="gl"><span><div style={{width:8,height:2,background:"#34C759"}}/> Apertura</span>
    {(mode==="cant"?AREAS.filter(x=>["ing","ape","bag","loc","chi","ped","gen"].includes(x.id)):AREAS).map(a=><span key={a.id}><div style={{width:6,height:6,borderRadius:2,background:ganttC[a.id]||"#86868b"}}/>{a.n}</span>)}</div></div>;
  };

  // RENDER
  const tabs=[["home","Home"],["tasks","Task"],["mat","Materiali"],["gantt","Gantt"],["team","Team"],["alert","Alert"]];

  if(live===null&&tasks.length===0)return<><div className="top"><h1>Nimbus 2026</h1></div><div className="ld">Connessione al foglio...</div></>;


  return<>
    <div className="top">
      <div style={{display:"flex",alignItems:"center"}}>
        <h1>Nimbus 2026</h1>
        {live===true&&<span className="live ok">LIVE</span>}
        {live===false&&<span className="live off">OFFLINE</span>}
        <button className="rb" onClick={load} style={{marginLeft:"auto"}}>Aggiorna</button>
      </div>
      <div className="cd">{dOpen}</div>
      <div className="sub">giorni all'apertura{lastUp&&" — agg. "+lastUp}</div>
    </div>
    <div className="nav">{tabs.map(([id,l])=><button key={id} className={v===id?"on":""} onClick={()=>setV(id)}>{l}</button>)}</div>
    <div className={"scroll"+(v==="gantt"?" gp":"")}>
      {tasks.length===0?<div className="ld">Nessun dato. Verifica che il foglio sia pubblicato sul web.</div>:
      <>{v==="home"&&<Home/>}{v==="tasks"&&<TasksView/>}{v==="mat"&&<MatView/>}{v==="gantt"&&<GanttView/>}{v==="team"&&<TeamView/>}{v==="alert"&&<AlertView/>}</>}
    </div>
    <Detail/>
  </>;
}

ReactDOM.render(<App/>,document.getElementById("app"));
</script>
</body>
</html>
